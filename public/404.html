<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amore Centro Di Bellezza</title>
    <!--
      SPA fallback for GitHub Pages — basado en
      https://github.com/rafgraph/spa-github-pages

      Cualquier ruta que no exista como archivo estático cae acá. Este
      script transforma la URL real en una query string que index.html
      sabe interpretar y restaura la ruta sin recargar la página.

      segmentCount = 1 → mantenemos el primer segmento (/Estetica-Gestion/).
      Cambiar a 0 si el sitio se sirve en raíz (dominio custom o user-page).
    -->
    <script type="text/javascript">
      (function () {
        var segmentCount = 1;
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
